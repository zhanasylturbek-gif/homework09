<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>IdeaHub Mini</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    header { background:#4f46e5; color:white; padding:15px; text-align:center; }
    .container { padding:20px; max-width:800px; margin:auto; }
    input, textarea { width:100%; padding:10px; margin:5px 0; }
    button { padding:10px; background:#4f46e5; color:white; border:none; cursor:pointer; }
    .post { background:white; padding:10px; margin-top:10px; border-radius:10px; }
    .date { font-size:12px; color:gray; }
  </style>
</head>
<body>

<header>
  <h2>💡 IdeaHub</h2>
  <p>Идеяларыңды бөліс!</p>
</header>

<div class="container">

  <h3>Жаңа идея қосу</h3>
  <input id="title" placeholder="Тақырып">
  <textarea id="content" placeholder="Идеяңды жаз..."></textarea>
  <button onclick="addPost()">Жіберу</button>

  <h3>📜 Барлық идеялар</h3>
  <div id="posts"></div>

</div>

<script>
let posts = [];

function addPost() {
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;
  const date = new Date().toLocaleString();

  if (!title || !content) {
    alert('Толтырыңыз!');
    return;
  }

  const post = { title, content, date };
  posts.unshift(post);

  renderPosts();

  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
}

function renderPosts() {
  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <h4>${p.title}</h4>
      <p>${p.content}</p>
      <div class="date">${p.date}</div>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
