<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>HealthyCare</title>
  <style>
    body { font-family: Arial; margin:0; background:#eef2ff; }
    header { background:#4f46e5; color:white; padding:15px; text-align:center; }
    .container { max-width:900px; margin:auto; padding:20px; }
    .card { background:white; padding:15px; border-radius:12px; margin-top:15px; }
    input, button { padding:10px; margin:5px 0; width:100%; }
    button { background:#4f46e5; color:white; border:none; cursor:pointer; }
    .result { margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>

<header>
  <h2>HealthyCare</h2>
  <p>Денсаулық бақылау мини жүйе</p>
</header>

<div class="container">

  <!-- BMI -->
  <div class="card">
    <h3>BMI есептеу</h3>
    <input id="weight" type="number" placeholder="Салмақ (кг)">
    <input id="height" type="number" placeholder="Бой (см)">
    <button onclick="calcBMI()">Есептеу</button>
    <div class="result" id="bmiResult"></div>
  </div>

  <!-- Water Tracker -->
  <div class="card">
    <h3> Су ішу трекері</h3>
    <button onclick="addWater()">+1 стакан</button>
    <div class="result" id="waterResult">0 стакан</div>
  </div>

  <!-- Notes -->
  <div class="card">
    <h3>Денсаулық жазбалар</h3>
    <input id="noteInput" placeholder="Жазба...">
    <button onclick="addNote()">Қосу</button>
    <ul id="notes"></ul>
  </div>

</div>

<script>
// BMI
function calcBMI() {
  let w = document.getElementById('weight').value;
  let h = document.getElementById('height').value / 100;
  if (!w || !h) return;

  let bmi = (w / (h*h)).toFixed(1);
  document.getElementById('bmiResult').innerText = "BMI: " + bmi;
}

// Water tracker
let water = 0;
function addWater() {
  water++;
  document.getElementById('waterResult').innerText = water + " стакан";
}

// Notes
function addNote() {
  let text = document.getElementById('noteInput').value;
  if (!text) return;

  let li = document.createElement('li');
  li.innerText = text;
  document.getElementById('notes').appendChild(li);

  document.getElementById('noteInput').value = '';
}
</script>

</body>
</html>
